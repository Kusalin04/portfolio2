<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤍ประวัติส่วนตัว🤍</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#f5f5f5,#dcdcdc);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#fff;
    width:350px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.card h1{
    color:#555;
    margin-bottom:20px;
}

.card p{
    font-size:18px;
    margin:12px 0;
    color:#333;
}

.card strong{
    color:#666;
}
</style>

</head>
<body>

<div class="card">
    <h1>ประวัติส่วนตัว</h1>

    <p><strong>ชื่อ :</strong> กุศลิน ชุมทัพวงษ์</p>
    <p><strong>ชื่อเล่น :</strong> ใบเฟิร์น</p>
    <p><strong>วันเกิด :</strong> 27 พฤศจิกายน 2551</p>
    <p><strong>อายุ :</strong> 17ปี</p>
</div>

</body>
</html>
