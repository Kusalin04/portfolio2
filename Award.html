<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลงาน</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#f5f5f5,#dcdcdc);
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    color:#555;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h2{
    padding:15px 15px 5px;
    color:#444;
}

.card p{
    padding:0 15px 15px;
    color:#666;
}

.btn{
    display:block;
    width:180px;
    text-align:center;
    margin:30px auto;
    padding:12px;
    background:#666;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.btn:hover{
    background:#444;
}
</style>

</head>
<body>

<div class="container">

<h1>ผลงานของฉัน</h1>

<div class="gallery">

    <div class="card">
        <img src="images/work1.jpg" alt="IMG_5862.jpeg">
        <h2>ผลงานที่ 1</h2>
        <p>เข้าร่วมติวเตรียม​หมอ​</p>
    </div>

    <div class="card">
        <img src="images/work2.jpg" alt="ผลงาน 2">
        <h2>ผลงานที่ 2</h2>
        <p>เข้าร่วมOpen Houseมหาวิทยาลัยธรรมศาสตร์​</p>
    </div>

    
<a href="index.html" class="btn">← กลับหน้าหลัก</a>

</div>

</body>
</html>
