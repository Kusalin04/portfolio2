<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการศึกษา</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#f5f5f5,#dcdcdc);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:500px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#555;
    margin-bottom:25px;
}

.item{
    background:#f3f3f3;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.item h3{
    color:#444;
    margin-bottom:8px;
}

.item p{
    color:#666;
}

.btn{
    display:block;
    width:180px;
    margin:20px auto 0;
    text-align:center;
    background:#666;
    color:white;
    text-decoration:none;
    padding:10px;
    border-radius:10px;
}

.btn:hover{
    background:#444;
}
</style>

</head>
<body>

<div class="card">

    <h1>ประวัติการศึกษา</h1>

    <div class="item">
        <h3>ระดับประถมศึกษา</h3>
        <p>โรงเรียนวัฒนานุศาสน์</p>
    </div>

    <div class="item">
        <h3>ระดับมัธยมศึกษาตอนต้น</h3>
        <p>โรงเรียนวัฒนานุศาสน์</p>
    </div>

    <div class="item">
        <h3>ระดับมัธยมศึกษาตอนปลาย</h3>
        <p>โรงเรียนพานทอง</p>
    </div>

    <a href="index.html" class="btn">← กลับหน้าหลัก</a>

</div>

</body>
</html>
